<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-Cast Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->

    <nav>

        <div class="logo">
            WeatherCast
        </div>

        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#search-section">Search</a></li>
            <li><a href="#weather-section">Forecast</a></li>
        </ul>

        <button id="themeToggle">
            🌙
        </button>

    </nav>

    <!-- HERO -->

    <header class="hero">

        <h1>Weather-Cast Dashboard</h1>

        <p>
            Get real-time weather information worldwide.
        </p>

    </header>

    <!-- SEARCH -->

    <section id="search-section">

        <div class="search-box">

            <input
                type="text"
                id="cityInput"
                placeholder="Search city..."
            >

            <button id="searchBtn">
                Search
            </button>

        </div>

    </section>

    <!-- WEATHER CARD -->

    <section id="weather-section">

        <div class="weather-card">

            <h2 id="cityName">
                Loading...
            </h2>

            <div class="temp-display">

                <img
                    id="weatherIcon"
                    src=""
                    alt="Weather Icon"
                >

                <h1 id="temperature">
                    --°C
                </h1>

            </div>

            <p id="condition">
                --
            </p>

        </div>

    </section>

    <!-- DETAILS -->

    <section class="details-container">

        <div class="detail-card">

            <span class="icon">
                💧
            </span>

            <h3>Humidity</h3>

            <p id="humidity">
                --%
            </p>

        </div>

        <div class="detail-card">

            <span class="icon">
                💨
            </span>

            <h3>Wind Speed</h3>

            <p id="wind">
                -- km/h
            </p>

        </div>

        <div class="detail-card">

            <span class="icon">
                🔽
            </span>

            <h3>Pressure</h3>

            <p id="pressure">
                --
            </p>

        </div>

        <div class="detail-card">

            <span class="icon">
                🌡️
            </span>

            <h3>Feels Like</h3>

            <p id="feelsLike">
                --°C
            </p>

        </div>

    </section>

    <!-- FOOTER -->

    <footer>

        <p>
            © 2026 Weather-Cast Dashboard
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
